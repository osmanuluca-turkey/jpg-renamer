name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pillow windnd pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name JPG_Renamer --hidden-import=PIL --hidden-import=PIL.Image --hidden-import=PIL.ImageTk --hidden-import=windnd renamer.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: JPG_Renamer_Windows
        path: dist/JPG_Renamer.exe
