name: Build EXE
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install pillow windnd pyinstaller
        shell: cmd
      - name: Build
        run: pyinstaller --onefile --windowed --noconfirm --name JPG_Renamer --hidden-import PIL --hidden-import PIL.Image --hidden-import PIL.ImageTk --hidden-import PIL._tkinter_finder --hidden-import windnd renamer.py
        shell: cmd
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: JPG_Renamer_Windows
          path: dist/JPG_Renamer.exe
